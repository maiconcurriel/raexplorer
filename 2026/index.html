<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="copa.png">
</head>
<body>

    <header>
        <img src="copa.png" width="100px" height="100px"><h1>Copa do Mundo</h1>
        <div class="menu-navegacao">
            <button class="btn-nav" onclick="mudarAba('calendario')">Calendário de Jogos</button>
            <button class="btn-nav active" onclick="mudarAba('grupos')">Fase de Grupos</button>
            <button class="btn-nav" onclick="mudarAba('fase32')">Fase de 32 (Mata-Mata)</button>
            <button class="btn-nav" onclick="mudarAba('finais')">Oitavas até Final</button>
            <button class="btn-reset" onclick="resetarSimulador()">🔄 Resetar</button>
        </div>
    </header>

    <main class="container">

        <section id="secao-calendario" class="aba-conteudo">
            <div class="filtro-calendario" style="margin-bottom: 20px; max-width: 300px;">
                <label for="select-data-jogo" style="font-weight: bold; color: var(--primary);">Escolha uma data:</label>
                <select id="select-data-jogo" onchange="renderizarJogosDoDia(this.value)" style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.9rem; font-weight: bold;"></select>
            </div>
            <!-- O grid-grupos aqui vai fazer os cards de jogos ficarem idênticos aos da Fase de Grupos -->
            <div class="grid-grupos" id="lista-jogos-dia"></div>
        </section>

        <section id="secao-grupos" class="aba-conteudo active">
            <div class="grid-grupos" id="container-grupos"></div>
        </section>

        <section id="secao-fase32" class="aba-conteudo">
            <div class="grid-mata" id="container-32avos"></div>
        </section>

        <section id="secao-finais" class="aba-conteudo">
            <div class="chaveamento-final">
                <div class="coluna-mata"><h3>Oitavas</h3><div id="oitavas-lista"></div></div>
                <div class="coluna-mata"><h3>Quartas</h3><div id="quartas-lista"></div></div>
                <div class="coluna-mata"><h3>Semis</h3><div id="semis-lista"></div></div>
                <div class="coluna-mata destaque">
                    <h3>Final e 3º Lugar</h3>
                    <div id="final-lista"></div>
                    <div id="terceiro-lista" style="margin-top: 30px;"></div>
                    <div id="campeao-box" class="campeao-container"></div>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
