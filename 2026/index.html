<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="copa.png">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; padding: 0 15px; flex-wrap: wrap; gap: 10px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="copa.png" width="60px" height="60px">
                <h1 style="margin: 0; font-size: 1.8rem;">Copa do Mundo</h1>
            </div>
            
            <div id="auth-panel" style="background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 8px; font-size: 0.9rem;">
                <div id="login-form">
                    <input type="email" id="login-email" placeholder="Login" style="width: 130px; height: 30px; padding: 5px; border-radius: 4px; border: none; font-weight: normal; text-align: left; margin-right: 5px;">
                    <input type="password" id="login-senha" placeholder="Senha" style="width: 100px; height: 30px; padding: 5px; border-radius: 4px; border: none; font-weight: normal; text-align: left; margin-right: 5px;">
                    <button onclick="loginAdmin()" style="background: var(--secondary); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Entrar</button>
                </div>
                <div id="logged-info" style="display: none; align-items: center; gap: 10px;">
                    <span>Admin Ativo</span>
                    <button onclick="logoutAdmin()" style="background: #333; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer;">❌</button>
                </div>
            </div>
        </div>

        <div class="menu-navegacao">
            <button class="btn-nav active" onclick="mudarAba('calendario')">Calendário de Jogos</button>
            <button class="btn-nav" onclick="mudarAba('grupos')">Fase de Grupos</button>
            <button class="btn-nav" onclick="mudarAba('fase32')">Fase de 32 (Mata-Mata)</button>
            <button class="btn-nav" onclick="mudarAba('finais')">Oitavas até Final</button>
            <button id="btn-reset-global" class="btn-reset" onclick="resetarSimulador()" style="display: none;">🔄 Resetar</button>
        </div>
    </header>

    <main class="container">

        <section id="secao-calendario" class="aba-conteudo active">
            <div class="filtro-calendario" style="margin-bottom: 20px; max-width: 300px;">
                <label for="select-data-jogo" style="font-weight: bold; color: var(--primary);">Escolha uma data:</label>
                <select id="select-data-jogo" onchange="renderizarJogosDoDia(this.value)"></select>
            </div>
            <div class="grid-grupos" id="lista-jogos-dia"></div>
        </section>

        <section id="secao-grupos" class="aba-conteudo">
            <div class="grid-grupos" id="container-grupos"></div>
        </section>

        <section id="secao-fase32" class="aba-conteudo">
            <div class="grid-mata" id="container-32avos"></div>
        </section>

        <section id="secao-finais" class="aba-conteudo">
            <div class="chaveamento-final">
                <div class="coluna-mata"><h3>Oitavas</h3><div id="oitavas-lista"></div></div>
                <div class="coluna-mata"><h3>Quartas</h3><div id="quartas-lista"></div></div>
                <div class="coluna-mata"><h3>Semis</h3><div id="semis-lista"></div></div>
                <div class="coluna-mata destaque">
                    <h3>Final e 3º Lugar</h3>
                    <div id="final-lista"></div>
                    <div id="terceiro-lista"></div>
                    <div id="campeao-box" class="campeao-container"></div>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>

</body>
</html>
